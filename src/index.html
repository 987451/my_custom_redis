<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Buffer Engine Studio</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <!-- 🌟 [혁신] 명령어 관제탑 (Command Center) -->
    <div class="card command-center">
        <h1>🎮 Engine Control Center</h1>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="runCommand('INFO')">📊 INFO</button>
            <button class="btn btn-primary" onclick="runCommand('STATS')">📈 STATS</button>
            <button class="btn btn-warning" onclick="runCommand('REWRITE')">🧹 REWRITE</button>
            <button class="btn btn-success" onclick="runCommand('SNAPSHOT')">📸 SNAPSHOT</button>
            <button class="btn btn-export" onclick="exportData()">📤 EXPORT (JSONL)</button>
            <button class="btn btn-danger" onclick="runCommand('SHUTDOWN')">🛑 SHUTDOWN</button>
        </div>
        <div id="cmd-output" class="console-output">명령어 결과가 여기에 표시됩니다...</div>
    </div>

    <!-- 기존 필터 및 입력 카드 -->
    <div class="card border-primary">
        <h1>🔍 Key Filter & Type Monitor</h1>
        <input type="text" id="filter-q" class="search-input" placeholder="키워드로 데이터 필터링..." oninput="updateData()">
    </div>

    <div class="card">
        <h1>🚀 Structured Data Manager</h1>
        <div class="input-group">
            <select id="data-type" onchange="updatePlaceholder()">
                <option value="string">String</option>
                <option value="list">List (Array)</option>
                <option value="hash">Hash (Object)</option>
                <option value="set">Set (Unique Array)</option>
            </select>
            <input type="text" id="key" placeholder="Key Name" class="flex-1">
        </div>
        <div class="mt-15">
            <textarea id="val-json" placeholder="여기에 값을 입력하세요..."></textarea>
        </div>
        <button class="btn btn-primary w-full mt-15" onclick="addData()">저장하기 (Save to Shard)</button>
    </div>

    <div class="card">
        <div id="data-table">데이터 로드 중...</div>
    </div>

    <div id="drop-zone" class="card drop-zone">
        <h1>📁 Knowledge Dropzone</h1>
        <p>JSON, CSV, 또는 TXT 파일을 여기로 드래그하세요.</p>
        <div id="upload-status"></div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
